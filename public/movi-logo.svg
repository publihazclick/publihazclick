<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="20" y="20" width="360" height="360" rx="80" ry="80" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle road/path lines -->
  <path d="M 80 310 Q 150 250 200 220 Q 260 185 320 160" stroke="rgba(255,255,255,0.12)" stroke-width="40" fill="none" stroke-linecap="round"/>
  <path d="M 80 310 Q 150 250 200 220 Q 260 185 320 160" stroke="rgba(255,255,255,0.08)" stroke-width="60" fill="none" stroke-linecap="round"/>

  <!-- Location pin icon -->
  <g transform="translate(200, 148)" filter="url(#innerShadow)">
    <path d="M 0 -58 C -32 -58 -52 -36 -52 -10 C -52 24 0 62 0 62 C 0 62 52 24 52 -10 C 52 -36 32 -58 0 -58 Z" fill="url(#pinGrad)"/>
    <circle cx="0" cy="-12" r="18" fill="url(#bgGrad)"/>
    <circle cx="0" cy="-12" r="8" fill="#FFFFFF"/>
  </g>

  <!-- MOVI text -->
  <text x="200" y="278" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">
    MOVI
  </text>

  <!-- Tagline -->
  <text x="200" y="310" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">
    La aplicación de transporte
  </text>
  <text x="200" y="330" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    Más segura a nivel mundial
  </text>
</svg>