@if (!isAuthRoute() && !isAdminOrDashboardRoute()) {
  <app-header />
}

<main>
  @if (isAuthRoute() || isAdminOrDashboardRoute()) {
    <!-- Mostrar solo el router-outlet para rutas de autenticación, admin y dashboard -->
    <router-outlet />
  } @else if (isLandingRoute()) {
    <!-- Mostrar contenido principal de la landing page -->
    <!-- Título de bienvenida -->
    <div class="relative bg-black overflow-hidden py-10 md:py-14">
      <!-- Fondo con gradiente radial -->
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_50%,rgba(0,229,255,0.08),transparent)]"></div>
      <!-- Línea decorativa superior -->
      <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-cyan-500/40 to-transparent"></div>
      <!-- Línea decorativa inferior -->
      <div class="absolute bottom-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-cyan-500/20 to-transparent"></div>

      <div class="relative text-center px-4">
        <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tight leading-none">
          <span class="relative inline-block">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Pantalla de bienvenida</span>
            <span class="absolute -bottom-1 left-0 right-0 h-0.5 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full"></span>
          </span>
        </h1>
      </div>
    </div>

    <app-banner-slider location="landing" />
    <app-hero />
    <app-ptc-ads />
    <app-video-section />


    <app-payment-testimonials />
    <app-pricing />
    <app-tiers />
  } @else {
    <!-- Páginas públicas: about, terms, 404, etc. -->
    <router-outlet />
  }
</main>

@if (!isAuthRoute() && !isAdminOrDashboardRoute()) {
  <app-footer />
}
