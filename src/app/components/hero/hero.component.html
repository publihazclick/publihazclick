<section class="relative bg-black overflow-hidden text-white">

  <!-- Fondos decorativos -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_70%_60%_at_50%_30%,rgba(0,229,255,0.08),transparent)] pointer-events-none"></div>
  <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-cyan-500/30 to-transparent"></div>

  <div class="relative z-10 max-w-7xl mx-auto px-4 md:px-6 pt-10 pb-8 md:pt-16 md:pb-12 text-center">

    <!-- Badge de plataforma verificada -->
    <div class="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 rounded-full px-4 py-1.5 mb-6">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse flex-shrink-0"></span>
      <span class="text-emerald-400 text-xs font-bold tracking-wide">Plataforma verificada · Pagos en 24h</span>
    </div>

    <!-- Titular principal -->
    <h1 class="text-3xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-8xl font-black tracking-[-0.04em] leading-tight mb-6 uppercase">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-primary to-blue-400">+ de 15 formas de generar ingresos reales desde tu celular</span>
    </h1>

  </div>

  <!-- Ticker de empresas colombianas -->
  <div class="overflow-hidden border-y border-white/5 bg-zinc-950/60 backdrop-blur-sm py-2.5">
    <div class="animate-scroll flex gap-3 w-max">
      @for (c of tickerCompanies; track c.name) {
        <div class="shrink-0 flex items-center gap-2 rounded-lg px-3 py-2 shadow-md"
             [style.background]="c.bg"
             style="min-width:150px;max-width:150px">
          <span class="text-base leading-none select-none">{{ c.icon }}</span>
          <div class="min-w-0 flex-1">
            <p class="text-white font-black text-[11px] leading-tight truncate">{{ c.name }}</p>
            <p class="text-white/55 text-[9px] leading-tight uppercase tracking-wider mt-0.5">{{ c.type }}</p>
          </div>
        </div>
      }
      @for (c of tickerCompanies; track c.name + '_2') {
        <div class="shrink-0 flex items-center gap-2 rounded-lg px-3 py-2 shadow-md"
             [style.background]="c.bg"
             style="min-width:150px;max-width:150px">
          <span class="text-base leading-none select-none">{{ c.icon }}</span>
          <div class="min-w-0 flex-1">
            <p class="text-white font-black text-[11px] leading-tight truncate">{{ c.name }}</p>
            <p class="text-white/55 text-[9px] leading-tight uppercase tracking-wider mt-0.5">{{ c.type }}</p>
          </div>
        </div>
      }
    </div>
  </div>

</section>
